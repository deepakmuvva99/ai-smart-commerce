server {
    listen 80;
    server_name _;

    # Serve Vite static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Assuming the backend doesn't expect the /api prefix, rewrite it.
        # If the backend expects /api, remove the rewrite.
        # Looking at core_backend/main.py, the routes are attached directly to root (e.g. /health).
        # Wait, the frontend code's .env says VITE_API_URL=http://localhost:8000
        # If we serve at root, this is better left as is for now since frontend directly hits :8000 without Nginx proxying it.
        # But if we were to proxy it, we'd do it here. For now, since docker-compose exposes :8000 to the host, 
        # let's just make sure Nginx serves the UI correctly on port 80.
        # So we can leave the api location open just in case.
        proxy_pass http://smart_commerce_backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
